<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ujian - CBT Online</title>

  <link rel="stylesheet" href="cbt-lite-icons.min.css?v=1">

  <!-- ✅ OPTIMIZATION: Split CSS - Load core + exam CSS (lite version) -->
  <link rel="stylesheet" href="style-core.min.css?v=2">
  <link rel="stylesheet" href="style-exam-lite.min.css?v=1">
  <link rel="stylesheet" href="style-modals.min.css?v=2">
  <link rel="stylesheet" href="style-exam-footer.min.css?v=1" data-lazy-load="exam" media="print" onload="this.media='all'">

</head>

<body oncontextmenu="return false;" class="exam-page">

  <!-- ══════════════════════════════════════
     EXAM VIEW
  ══════════════════════════════════════ -->
  <div id="exam-view" class="view active exam-layout">

    <!-- Header -->
    <div class="modern-exam-header">
      <div class="header-left">
        <button id="btnGrid" class="header-menu-btn" title="Grid Soal">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3zM14 14h7v7h-7z"/>
          </svg>
        </button>
        <div class="header-info">
          <div id="exam-title" class="exam-main-title">Ujian</div>
          <div id="exam-user-info" class="exam-status-sub">-</div>
        </div>
      </div>
      <div class="modern-timer">
        <div id="exam-timer" class="timer-value">00:00:00</div>
      </div>
    </div>

    <!-- Progress Bar -->
    <div class="exam-progress-area">
      <div class="progress-labels">
        <span id="q-progress-text">SOAL 1 / 10 (PG)</span>
        <span id="q-percentage">0%</span>
      </div>
      <div class="modern-progress-bg">
        <div id="q-progress-bar" class="modern-progress-fill" style="width: 0%;"></div>
      </div>
    </div>

    <!-- Question Content -->
    <div class="exam-content-scrollable">
      <div class="question-wrapper">
        <div id="q-type-badge" class="q-type-badge">PG</div>
        <div id="q-instruction" class="q-instruction-text"></div>
        <div id="q-text" class="modern-question-text"></div>
        <div id="q-image-container" class="question-image-wrapper" style="display:none;"></div>
        <div id="q-options" class="modern-answer-area"></div>
      </div>
    </div>

    <!-- Footer Navigation -->
    <div class="modern-footer">
      <div class="footer-actions">
        <!-- Tombol Previous -->
        <button id="btnPrev" class="btn-footer-outline btn-icon-only" title="Soal Sebelumnya">
          <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>

        <!-- Tombol Ragu -->
        <button id="btnDoubt" class="btn-footer-warning btn-icon-only" title="Ragu-ragu">
          <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
          </svg>
        </button>

        <!-- Tombol Next -->
        <button id="btnNext" class="btn-footer-primary btn-icon-only" title="Soal Selanjutnya">
          <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </button>

        <!-- Tombol Submit / Selesai -->
        <button id="btnSubmit" class="btn-footer-submit btn-icon-only" style="display:none;" title="Selesai Ujian">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </button>
      </div>
      <div class="home-indicator"></div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
     QUESTION GRID PANEL
  ══════════════════════════════════════ -->
  <div id="qGridContainer" class="q-grid-container" style="display:none;">
    <div class="q-grid-header">
      <span>Navigasi Soal</span>
      <button id="btnCloseGrid" class="btn-close-grid">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div id="qGrid" class="q-grid"></div>
  </div>
  <div id="gridOverlay" class="grid-overlay" style="display:none;" onclick="closeGrid()"></div>

  <!-- ══════════════════════════════════════
     MODALS & OVERLAYS (Exam)
  ══════════════════════════════════════ -->

  <!-- Broadcast Modal -->
  <div id="broadcast-overlay" class="broadcast-overlay" style="display:none;"></div>
  <div id="broadcast-modal" class="broadcast-modal" style="display:none;">
    <div class="broadcast-content">
      <div class="broadcast-icon">📢</div>
      <h3>Pengumuman dari Proktor</h3>
      <p id="broadcast-text"></p>
      <button class="btn btn-primary" onclick="closeBroadcastModal()">Saya Mengerti</button>
    </div>
  </div>

  <!-- Zoom Modal -->
  <div id="zoom-overlay" class="zoom-overlay" style="display:none;" onclick="closeZoomModal()"></div>
  <div id="zoom-modal" class="zoom-modal" style="display:none;">
    <img id="zoom-image" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="">
  </div>

  <!-- Cheat Alert -->
  <div id="cheat-alert-overlay" class="cheat-alert-overlay" style="display:none;">
    <div class="cheat-alert-content">
      <div class="cheat-icon">⚠️</div>
      <h3>Peringatan Pelanggaran</h3>
      <p>Anda terdeteksi melakukan aktivitas mencurigakan.</p>
      <div id="cheat-countdown" class="cheat-countdown">3</div>
      <p class="cheat-sub">Ujian akan ditutup otomatis jika pelanggaran berlanjut</p>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="loading-overlay" style="display:none;">
    <div class="loader-container">
      <div class="spinner"></div>
      <p id="loading-overlay-text" style="color:var(--text-muted);font-size:0.875rem;margin-top:8px;">Memuat soal...</p>
    </div>
  </div>

  <!-- Custom Alert Modal -->
  <div id="custom-alert-modal" class="custom-alert-overlay" style="display:none;">
    <div class="custom-alert-card">
      <div id="custom-alert-icon" style="font-size:2.5rem;margin-bottom:12px;">⚠️</div>
      <h3 id="custom-alert-title" style="margin:0 0 8px 0;font-size:1rem;"></h3>
      <p id="custom-alert-message" style="font-size:0.85rem;color:var(--text-muted);margin:0 0 20px 0;white-space:pre-wrap;line-height:1.5;"></p>
      <div id="custom-alert-actions" style="display:flex;gap:10px;">
        <button id="custom-alert-cancel" class="btn btn-outline btn-block" onclick="closeCustomAlert(false)" style="padding:10px;display:none;">Batal</button>
        <button id="custom-alert-ok" class="btn btn-primary btn-block" onclick="closeCustomAlert(true)" style="padding:10px;">OK</button>
      </div>
    </div>
  </div>

  <!-- ============================================ -->
  <!-- CRITICAL SCRIPTS (load immediately) -->
  <!-- ============================================ -->
  
  <!-- 🚨 RATE LIMITER - Load first untuk prevent 900 siswa overload -->
  <script src="rate-limiter.min.js?v=1" defer></script>
  
  <!-- ⚡ SPEED OPTIMIZATION - Parallel batch + instant login + lazy render -->
  <script src="parallel-batch-optimizer.min.js?v=1" defer></script>
  <script src="instant-login.min.js?v=1" defer></script>
  <script src="lazy-render-questions.min.js?v=1" defer></script>
  <script src="optimized-answer-sync.min.js?v=1" defer></script>
  
  <script src="sync-optimizer.min.js?v=1" defer></script>
  <script src="bandwidth-optimizer.min.js?v=1" defer></script>
  <script src="css-lazy-loader.min.js?v=1" defer></script>
  <script src="image-optimizer.min.js?v=1" defer></script>
  
  <script src="supabase-adapter.min.js?v=2" defer></script>
  <!-- ✅ Firebase mock (MUST load before supabase-patch.js) -->
  <script src="firebase-mock.min.js" defer></script>
  <script src="supabase-patch.min.js?v=8" defer></script>
  <!-- ✅ CRITICAL: Load script.min.js (exam-core depends on it) -->
  <script src="script.min.js?v=10" defer></script>
  <script src="cbt-static-runtime.min.js?v=2" defer></script>
  <script src="cbt-performance-hardening.min.js?v=2" defer></script>
  <script src="cbt-admin-signals.min.js?v=1" defer></script>
  <script src="exam-core.min.js?v=4" defer></script>
  <script src="mobile-sync-wrapper.min.js?v=1" defer></script>

  <!-- ============================================ -->
  <!-- BUGFIX: ENHANCED ANTI-CHEAT OVERRIDE -->
  <!-- ============================================ -->
  <script>
    (function() {
      let _cheatInterval = null;
      let _sirenAudio = null;

      window.handleCheatDetection = function() {
        if (!window.State || !window.State.examActive || !window.State.security || !window.State.security.anticheat) return;
        
        // 1. Tambah jumlah pelanggaran
        window.State.violations = (window.State.violations || 0) + 1;
        if (typeof window.saveStateLocal === 'function') window.saveStateLocal();

        const overlay = document.getElementById('cheat-alert-overlay');
        if (overlay) overlay.classList.add('active');

        // 2. Alarm berulang-ulang
        try {
          if (!_sirenAudio) {
            // Gunakan file sirine jika ada, atau buat synth bip
            _sirenAudio = new Audio('assets/siren.mp3'); 
            _sirenAudio.loop = true;
          }
          _sirenAudio.play().catch(e => {
            // Fallback: Web Audio API beep jika file tidak ketemu / autoplay diblokir
            try { window.playSiren && window.playSiren(); } catch(err){}
          });
        } catch(e) {}

        // 3. Hukuman waktu berlipat ganda (10 detik x Jumlah pelanggaran)
        let count = 10 * window.State.violations;
        const countEl = document.getElementById('cheat-countdown');
        if (countEl) countEl.textContent = count;

        // 4. Bersihkan interval lama agar tidak balapan (countdown terlalu cepat)
        if (_cheatInterval) clearInterval(_cheatInterval);

        _cheatInterval = setInterval(() => {
          count--;
          if (countEl) countEl.textContent = count;
          
          // Ulangi sirine fallback jika perlu
          if (count % 2 === 0 && (!_sirenAudio || _sirenAudio.paused)) {
             try { window.playSiren && window.playSiren(); } catch(err){}
          }
          
          if (count <= 0) {
            clearInterval(_cheatInterval);
            _cheatInterval = null;
            
            // Matikan alarm
            if (_sirenAudio) {
              _sirenAudio.pause();
              _sirenAudio.currentTime = 0;
            }

            // Tutup overlay
            if (overlay) overlay.classList.remove('active');
            
            // Kembalikan ke Fullscreen
            if (window.State.security.fullscreen && !document.fullscreenElement) {
              document.documentElement.requestFullscreen().catch(e => { });
            }
          }
        }, 1000);

        // 5. Sync log ke database
        if (typeof window.withDB === 'function' && window.insertSupabase) {
          window.withDB(async function (db) {
            try {
              const payload = {
                exam_id: window.State.config.id_ujian,
                user_id: window.State.user.id,
                nama: window.State.user.name,
                kelas: window.State.user.kelas,
                tipe: 'TAB_SWITCH',
                timestamp: Date.now()
              };
              await window.insertSupabase('pelanggaran', payload);
              if (db && db.ref) db.ref('/pelanggaran').push(payload);
            } catch(e) {}
          });
        }
      };
    })();
  </script>

  <!-- ============================================ -->
  <!-- PHASE 2: DEFERRED SCRIPTS (load after page) -->
  <!-- ============================================ -->
  
  <script>
    // Phase 2 Optimization: Lazy load non-critical scripts after exam page renders
    // This defers ~47 KB of JS from initial load
    (function() {
      const DEFERRED_SCRIPTS = [
        'lazy-loading-core.min.js',
        'sw-image-cache.min.js',
        'predictive-cache.min.js',
        'differential-sync.min.js',
        'data-compression.min.js',
        'exam-advanced-integration.min.js'
      ];
      
      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = src;
          s.async = true;
          s.onload = resolve;
          s.onerror = () => { console.warn('[LazyLoad] Failed:', src); resolve(); };
          document.head.appendChild(s);
        });
      }
      
      function loadCSS(href) {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = href;
        document.head.appendChild(link);
      }
      
      // Load deferred scripts after page is interactive
      if (document.readyState === 'complete') {
        init();
      } else {
        window.addEventListener('load', init);
      }
      
      function init() {
        // Small delay to let critical rendering complete
        setTimeout(async () => {
          // Load deferred scripts sequentially (some depend on each other)
          for (const src of DEFERRED_SCRIPTS) {
            await loadScript(src);
          }
          
          console.log('✅ Phase 2: Deferred scripts loaded');
          
          // Register the single app Service Worker
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
              .then(reg => console.log('✅ SW registered'))
              .catch(err => console.warn('SW error:', err));
          }
          
          // Initialize modules if available
          if (window.stateManager) window.stateManager.init();
          if (window.performanceMonitor) window.performanceMonitor.start();
          if (window.syncManager) window.syncManager.connect();
        }, 100);
      }
    })();
  </script>

  <script>
    console.log('✅ Exam page optimized (Phase 1-2)');
  </script>
</body>
</html>
