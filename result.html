<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hasil Ujian - CBT Online</title>

  <link rel="preconnect" href="https://cdnjs.cloudflare.com">

  <!-- ✅ OPTIMIZATION: Split CSS - Load core + exam CSS -->
  <link rel="stylesheet" href="style-core.min.css?v=2">
  <link rel="stylesheet" href="style-exam-lite.min.css?v=1">
  <link rel="stylesheet" href="style-modals.min.css?v=2">
  <link rel="stylesheet" href="style-result.min.css?v=1">



  <!-- ✅ Core Scripts -->
  <script defer src="firebase-mock.min.js"></script>
  <script defer src="supabase-adapter.min.js?v=2"></script>
  <script defer src="supabase-patch.min.js?v=8"></script>
  <script defer src="script.min.js?v=10"></script>
  <script defer src="result-core.min.js?v=2"></script>

</head>

<body oncontextmenu="return false;" class="result-page">

  <!-- ══════════════════════════════════════
     RESULT VIEW
  ══════════════════════════════════════ -->
  <div id="result-view" class="view active result-layout">
    <div class="result-container">
      <div class="result-card">
        
        <!-- Header / Icon -->
        <div class="result-icon">
          <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <path d="M20 6L9 17l-5-5"/>
          </svg>
        </div>

        <h2 class="result-title">Selesai Ujian</h2>
        <p id="result-exam-name" class="result-exam-sub">-</p>

        <!-- Score Circle -->
        <div class="result-score-wrapper">
          <div id="result-score" class="result-score">0</div>
          <div class="result-score-label">Skor Akhir</div>
        </div>

        <!-- Statistics Grid -->
        <div class="result-stats">
          <div class="stat-item">
            <div class="stat-value" id="result-correct">0</div>
            <div class="stat-label">Benar</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="result-wrong">0</div>
            <div class="stat-label">Salah</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="result-empty">0</div>
            <div class="stat-label">Kosong</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="result-total">0</div>
            <div class="stat-label">Soal</div>
          </div>
        </div>

        <!-- Detailed Info List -->
        <div class="result-info">
          <div class="result-info-row">
            <span class="info-label">Nama Lengkap</span>
            <span class="info-value" id="result-name">-</span>
          </div>
          <div class="result-info-row">
            <span class="info-label">Kelas</span>
            <span class="info-value" id="result-kelas">-</span>
          </div>
          <div class="result-info-row">
            <span class="info-label">Waktu Selesai</span>
            <span class="info-value" id="result-time">-</span>
          </div>
          <div class="result-info-row">
            <span class="info-label">Peringatan / Pelanggaran</span>
            <span class="info-value" id="result-violations" style="color:#ef4444;">0</span>
          </div>
        </div>

        <!-- Remedial Notice -->
        <div id="result-remedial-info" class="remedial-info" style="display:none;">
          <div class="remedial-badge">Remedial</div>
          <p id="remedial-msg">Nilai Anda di bawah KKM. Anda akan dijadwalkan untuk mengikuti ujian remedial.</p>
        </div>

        <!-- Action Button -->
        <button id="btnBackSchedule" class="btn-primary result-btn">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          Kembali ke Dashboard
        </button>
        
      </div>
    </div>
  </div>

  <!-- Premium Loading Overlay -->
  <div id="loading-overlay" class="loading-overlay" style="display:none;">
    <div class="loader-content-card">
      <div class="spinner-premium"></div>
      <p id="loading-overlay-text">Memuat hasil...</p>
    </div>
  </div>

  <!-- Custom Alert Modal -->
  <div id="custom-alert-modal" class="custom-alert-overlay" style="display:none;">
    <div class="custom-alert-card">
      <div id="custom-alert-icon" style="font-size:2.5rem;margin-bottom:12px;">⚠️</div>
      <h3 id="custom-alert-title" style="margin:0 0 8px 0;font-size:1rem;"></h3>
      <p id="custom-alert-message" style="font-size:0.85rem;color:var(--text-muted);margin:0 0 20px 0;white-space:pre-wrap;line-height:1.5;"></p>
      <button class="btn btn-primary btn-block" onclick="closeCustomAlert()" style="padding:10px;">OK</button>
    </div>
  </div>

</body>
</html>
